<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运维平台</title>
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  

  <style>
    /* body {
      display: flex;
    } */

    #sidebar {
      position: fixed;
      min-width: 250px;
      max-width: 250px;
      background-color: #343a40;
      min-height: 100vh;
    }

    #sidebar .nav-link {
      color: #fff;
    }

    #content {
      flex-grow: 1;
      padding: 20px;
    }

    /* 自定义滚动条的整体样式 */
    ::-webkit-scrollbar {
      width: 12px;
      /* 设置滚动条的宽度 */
      height: 12px;
      /* 水平滚动条的高度（如果需要的话） */
    }

    /* 自定义滚动条轨道的样式 */
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
      /* 轨道的背景颜色 */
      border-radius: 10px;
      /* 轨道的圆角 */
    }

    /* 自定义滚动条滑块的样式 */
    ::-webkit-scrollbar-thumb {
      background: #888;
      /* 滑块的背景颜色 */
      border-radius: 10px;
      /* 滑块的圆角 */
    }

    /* 当滑块悬停或激活时自定义其样式 */
    ::-webkit-scrollbar-thumb:hover {
      background: #555;
      /* 滑块悬停时的背景颜色 */
    }

    ::-webkit-scrollbar-thumb:active {
      background: #000;
      /* 滑块激活时的背景颜色 */
    }
  </style>
</head>

<body>
  <div id="app"></div>
  

  <script type="module" src="/src/main.js"></script>
  <script src="/js/axios.min.js"></script>
  <script src="/js/bootstrap.bundle.min.js"></script>
  <!-- echarts (用于绘图) -->
  <script src="/js/echarts.min.js"></script>

</body>

</html>
